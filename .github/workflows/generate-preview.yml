name: Generate Resume Preview

on:
  workflow_run:
    workflows: ["Build Resume PDF"]
    types:
      - completed

permissions:
  contents: write

jobs:
  preview:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick ghostscript

      - name: Generate preview
        run: |
          convert -density 200 "Resume - Vanshaj Saxena.pdf" -background white -alpha remove resume-preview.png

      - name: Commit preview if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add resume-preview.png
          git diff --cached --quiet || git commit -m "chore: update resume preview"
          git push
