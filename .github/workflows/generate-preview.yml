name: Generate Resume Preview

on:
  push:
    branches: [master]
    paths:
      - "Resume - Vanshaj Saxena.pdf"

jobs:
  generate-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Generate resume preview
        run: |
          magick -density 200 "Resume - Vanshaj Saxena.pdf" -background white -alpha remove resume-preview.png

      - name: Commit preview if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add resume-preview.png
          git diff --cached --quiet || git commit -m "Update resume preview"
          git push
