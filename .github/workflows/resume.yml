name: Build and Preview Resume

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tectonic
        uses: wtfjoke/setup-tectonic@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Tectonic Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/Tectonic
          key: ${{ runner.os }}-tectonic-${{ hashFiles('**/*.tex') }}
          restore-keys: |
            ${{ runner.os }}-tectonic-

      - name: Build PDF
        run: |
          tectonic "Resume - Vanshaj Saxena.tex"

      - name: Generate Preview Image
        run: |
          # Fix: Ubuntu's ImageMagick policy often blocks PDF conversion
          sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml

          sudo apt-get update && sudo apt-get install -y imagemagick ghostscript

          convert -density 200 "Resume - Vanshaj Saxena.pdf"[0] -background white -alpha remove resume-preview.png

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "Resume - Vanshaj Saxena.pdf" resume-preview.png

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "build: update resume pdf and preview"
            git push
          else
            echo "No changes detected. Skipping push."
          fi
